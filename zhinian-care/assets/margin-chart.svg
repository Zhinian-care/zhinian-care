<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f2a1e"/>
      <stop offset="100%" stop-color="#1b4332"/>
    </linearGradient>
    <linearGradient id="lineG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2d6a4f"/>
      <stop offset="50%" stop-color="#52b788"/>
      <stop offset="100%" stop-color="#95d5b2"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg2)"/>

  <text x="40" y="45" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="16" font-weight="600" fill="#d8f3dc" letter-spacing="2">Net Margin Trend</text>
  <text x="40" y="68" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="11" fill="#2d6a4f">Percentage</text>

  <!-- Grid -->
  <g stroke="#1b4332" stroke-width="0.5">
    <line x1="80" y1="350" x2="560" y2="350"/>
    <line x1="80" y1="280" x2="560" y2="280"/>
    <line x1="80" y1="210" x2="560" y2="210"/>
    <line x1="80" y1="140" x2="560" y2="140"/>
    <line x1="80" y1="70" x2="560" y2="70"/>
  </g>

  <!-- Y labels -->
  <g font-family="monospace" font-size="10" fill="#2d6a4f">
    <text x="60" y="353">-10%</text>
    <text x="65" y="283">0%</text>
    <text x="65" y="213">10%</text>
    <text x="65" y="143">20%</text>
    <text x="65" y="73">30%</text>
  </g>

  <!-- X labels -->
  <g font-family="'PingFang SC',sans-serif" font-size="11" fill="#2d6a4f" text-anchor="middle">
    <text x="128" y="380">2026</text>
    <text x="224" y="380">2027</text>
    <text x="320" y="380">2028</text>
    <text x="416" y="380">2029</text>
    <text x="512" y="380">2030</text>
  </g>

  <!-- Area under curve -->
  <path d="M128 300 L224 218 L320 165 L416 123 L512 88 L512 350 L128 350Z" fill="url(#lineG)" opacity="0.08">
    <animate attributeName="opacity" values="0;0.08" dur="2s" fill="freeze"/>
  </path>

  <!-- Line -->
  <polyline points="128,300 224,218 320,165 416,123 512,88" stroke="url(#lineG)" stroke-width="2.5" fill="none" stroke-linejoin="round">
    <animate attributeName="stroke-dashoffset" from="800" to="0" dur="2s" fill="freeze"/>
    <animate attributeName="stroke-dasharray" from="0 800" to="800 0" dur="2s" fill="freeze"/>
  </polyline>

  <!-- Data dots -->
  <g>
    <circle cx="128" cy="300" r="5" fill="#2d6a4f" stroke="#52b788" stroke-width="1.5">
      <animate attributeName="r" values="0;5" dur="0.3s" begin="2s" fill="freeze"/>
    </circle>
    <text x="128" y="290" font-family="monospace" font-size="10" fill="#52b788" text-anchor="middle">-3.0%</text>

    <circle cx="224" cy="218" r="5" fill="#2d6a4f" stroke="#52b788" stroke-width="1.5">
      <animate attributeName="r" values="0;5" dur="0.3s" begin="2.3s" fill="freeze"/>
    </circle>
    <text x="224" y="208" font-family="monospace" font-size="10" fill="#52b788" text-anchor="middle">16.7%</text>

    <circle cx="320" cy="165" r="5" fill="#2d6a4f" stroke="#52b788" stroke-width="1.5">
      <animate attributeName="r" values="0;5" dur="0.3s" begin="2.6s" fill="freeze"/>
    </circle>
    <text x="320" y="155" font-family="monospace" font-size="10" fill="#52b788" text-anchor="middle">25.2%</text>

    <circle cx="416" cy="123" r="5" fill="#2d6a4f" stroke="#52b788" stroke-width="1.5">
      <animate attributeName="r" values="0;5" dur="0.3s" begin="2.9s" fill="freeze"/>
    </circle>
    <text x="416" y="113" font-family="monospace" font-size="10" fill="#52b788" text-anchor="middle">30.7%</text>

    <circle cx="512" cy="88" r="6" fill="#52b788" stroke="#95d5b2" stroke-width="2">
      <animate attributeName="r" values="0;6" dur="0.3s" begin="3.2s" fill="freeze"/>
      <animate attributeName="opacity" values="1;0.6;1" dur="2s" begin="3.5s" repeatCount="indefinite"/>
    </circle>
    <text x="512" y="78" font-family="monospace" font-size="11" font-weight="700" fill="#95d5b2" text-anchor="middle">36.1%</text>
  </g>

  <!-- Break-even marker line -->
  <line x1="80" y1="283" x2="560" y2="283" stroke="#cc7722" stroke-width="1" stroke-dasharray="4 4" opacity="0">
    <animate attributeName="opacity" values="0;0.5" dur="1s" begin="3.5s" fill="freeze"/>
  </line>
  <text x="560" y="278" font-family="monospace" font-size="9" fill="#cc7722" opacity="0">Break-even
    <animate attributeName="opacity" values="0;0.6" dur="1s" begin="3.5s" fill="freeze"/>
  </text>
</svg>