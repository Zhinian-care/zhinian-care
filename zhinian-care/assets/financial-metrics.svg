<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" fill="none">
  <defs>
    <linearGradient id="bg6" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f2a1e"/>
      <stop offset="100%" stop-color="#1b4332"/>
    </linearGradient>
  </defs>
  <rect width="600" height="320" fill="url(#bg6)"/>

  <text x="300" y="40" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="16" font-weight="600" fill="#d8f3dc" text-anchor="middle" letter-spacing="2">Key Financial Metrics at a Glance</text>

  <g transform="translate(30,60)">
    <!-- Card 1: Start-up Capital -->
    <rect x="0" y="0" width="260" height="110" rx="12" fill="rgba(45,106,79,0.12)" stroke="rgba(45,106,79,0.3)" stroke-width="1">
      <animate attributeName="opacity" from="0" to="1" dur="0.8s" fill="freeze"/>
    </rect>
    <text x="20" y="30" font-family="'PingFang SC',sans-serif" font-size="11" fill="#2d6a4f">启动资金</text>
    <text x="20" y="64" font-family="monospace" font-size="28" font-weight="700" fill="#95d5b2">500K</text>
    <text x="20" y="86" font-family="monospace" font-size="11" fill="#2d6a4f">CNY · 全部由创始团队出资</text>

    <!-- Card 2: Break-even -->
    <rect x="280" y="0" width="260" height="110" rx="12" fill="rgba(45,106,79,0.12)" stroke="rgba(45,106,79,0.3)" stroke-width="1">
      <animate attributeName="opacity" from="0" to="1" dur="0.8s" begin="0.3s" fill="freeze"/>
    </rect>
    <text x="300" y="30" font-family="'PingFang SC',sans-serif" font-size="11" fill="#2d6a4f">盈亏平衡</text>
    <text x="300" y="64" font-family="monospace" font-size="28" font-weight="700" fill="#95d5b2">Year 2</text>
    <text x="300" y="86" font-family="monospace" font-size="11" fill="#2d6a4f">约 95 户即可实现盈亏平衡</text>

    <!-- Card 3: Net Margin -->
    <rect x="0" y="130" width="260" height="110" rx="12" fill="rgba(45,106,79,0.12)" stroke="rgba(45,106,79,0.3)" stroke-width="1">
      <animate attributeName="opacity" from="0" to="1" dur="0.8s" begin="0.6s" fill="freeze"/>
    </rect>
    <text x="20" y="160" font-family="'PingFang SC',sans-serif" font-size="11" fill="#2d6a4f">第五年净利润率</text>
    <text x="20" y="194" font-family="monospace" font-size="28" font-weight="700" fill="#95d5b2">36.1%</text>
    <text x="20" y="216" font-family="monospace" font-size="11" fill="#2d6a4f">2030 年净利润 CNY 2.81M</text>

    <!-- Card 4: Payback -->
    <rect x="280" y="130" width="260" height="110" rx="12" fill="rgba(45,106,79,0.12)" stroke="rgba(45,106,79,0.3)" stroke-width="1">
      <animate attributeName="opacity" from="0" to="1" dur="0.8s" begin="0.9s" fill="freeze"/>
    </rect>
    <text x="300" y="160" font-family="'PingFang SC',sans-serif" font-size="11" fill="#2d6a4f">投资回收期</text>
    <text x="300" y="194" font-family="monospace" font-size="28" font-weight="700" fill="#95d5b2">~3 年</text>
    <text x="300" y="216" font-family="monospace" font-size="11" fill="#2d6a4f">2028 年初回本</text>
  </g>
</svg>